# Secrets configuration for todo-chatbot Helm chart
# Copy this file to secrets.yaml and fill in your values
# NEVER commit secrets.yaml to version control!

backend:
  secrets:
    # OpenRouter API key (primary AI provider)
    openRouterApiKey: "sk-or-v1-your-key-here"

    # OpenAI API key (fallback if OpenRouter not used)
    openaiApiKey: ""

    # Better Auth secret for JWT validation (generate with: openssl rand -base64 32)
    betterAuthSecret: "generate-a-random-secret-here"

    # Neon PostgreSQL connection string (use asyncpg driver)
    databaseUrl: "postgresql+asyncpg://user:password@ep-xxx.neon.tech/dbname"

    # Internal service token for MCP server communication
    internalServiceToken: "your-internal-token"

    # Phase 2 API URL (only if connecting to Phase 2 backend)
    phase2ApiUrl: ""
